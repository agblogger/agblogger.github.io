title: AgBlogger
description: >-
  A markdown-first blogging platform with a bidirectional sync engine,
  label DAG, cross-posting, and full-text search.
baseurl: ""
url: "https://agblogger.github.io"

remote_theme: just-the-docs/just-the-docs@v0.10.0

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-seo-tag

# Just the Docs configuration
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

nav_sort: order

color_scheme: dark

# Callouts
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Footer
footer_content: "AgBlogger &mdash; Markdown-first blogging with sync."

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Heading anchors
heading_anchors: true

# Aux links (top-right)
aux_links:
  "AgBlogger on GitHub":
    - "https://github.com/agblogger/agblogger"

aux_links_new_tab: true

# Makes Aux links open in a new tab
enable_copy_code_button: true
